services:
  web:
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html:ro
      - vendor:/var/www/html/vendor:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost
      LOG_CHANNEL: stderr
      LOG_STDERR_FORMATTER: Monolog\\Formatter\\JsonFormatter
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: diva_jewelry
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      QUEUE_RETRY_AFTER: 120
      QUEUE_BLOCK_FOR: 5
      SESSION_SECURE_COOKIE: "false"
      SESSION_SAME_SITE: lax
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: phpredis
      REDIS_DB: 0
      REDIS_CACHE_DB: 1
      CORS_ALLOWED_ORIGINS: http://localhost,http://127.0.0.1,http://localhost:5173,http://127.0.0.1:5173
      CORS_SUPPORTS_CREDENTIALS: "true"
      VITE_HOST: 0.0.0.0
      VITE_PORT: 5173
      VITE_HMR_HOST: localhost
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor
      - node_modules:/var/www/html/node_modules
    entrypoint: ["/usr/local/bin/docker-app-entrypoint.sh"]
    command: ["php-fpm"]
    healthcheck:
      test: ["CMD-SHELL", "php artisan route:list --path=live > /dev/null && php-fpm -t > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  vite:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      app:
        condition: service_healthy
    environment:
      APP_URL: http://localhost
      CORS_ALLOWED_ORIGINS: http://localhost,http://127.0.0.1,http://localhost:5173,http://127.0.0.1:5173
      VITE_HOST: 0.0.0.0
      VITE_PORT: 5173
      VITE_HMR_HOST: localhost
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor
      - node_modules:/var/www/html/node_modules
    entrypoint: ["/usr/local/bin/docker-vite-entrypoint.sh"]
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173", "--strictPort"]

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost
      LOG_CHANNEL: stderr
      LOG_STDERR_FORMATTER: Monolog\\Formatter\\JsonFormatter
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: diva_jewelry
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      QUEUE_RETRY_AFTER: 120
      QUEUE_BLOCK_FOR: 5
      QUEUE_WORKER_SLEEP: 1
      QUEUE_WORKER_TRIES: 3
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: phpredis
      REDIS_DB: 0
      REDIS_CACHE_DB: 1
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor
      - node_modules:/var/www/html/node_modules
    entrypoint: ["/usr/local/bin/docker-app-entrypoint.sh"]
    command: ["sh", "-lc", "php artisan queue:work --sleep=${QUEUE_WORKER_SLEEP:-1} --tries=${QUEUE_WORKER_TRIES:-3} --max-time=3600"]

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: diva_jewelry
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  node_modules:
  redis_data:
  vendor:
